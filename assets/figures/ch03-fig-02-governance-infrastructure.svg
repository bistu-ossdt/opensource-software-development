  <rect class="box-accent" x="930" y="340" width="220" height="92" />
  <text class="box-title" x="1040" y="376">模板与分诊</text>
  <text class="box-note" x="1040" y="406">Issue / PR 模板与工作项组织</text>

  <rect class="box-accent" x="930" y="466" width="220" height="92" />
  <text class="box-title" x="1040" y="502">例外通道</text>
