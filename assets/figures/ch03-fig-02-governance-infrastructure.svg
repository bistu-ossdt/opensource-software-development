  <text class="box-title" x="224" y="376">CODE_OF_CONDUCT.md</text>
  <text class="box-note" x="224" y="406">行为边界与处理责任</text>

  <rect class="box" x="114" y="466" width="220" height="92" />
  <text class="box-title" x="224" y="502">GOVERNANCE.md</text>
  <text class="box-note" x="224" y="532">角色、决策与发布责任</text>

